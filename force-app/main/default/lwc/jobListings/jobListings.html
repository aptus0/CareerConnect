<template>
    <div class="job-listings-container">
        <!-- Header & Filters -->
        <div class="filter-bar">
            <lightning-input
                type="search"
                label="Search Jobs"
                placeholder="e.g. Salesforce Developer..."
                value={searchTerm}
                onchange={handleSearchChange}
                class="search-input">
            </lightning-input>

            <lightning-combobox
                label="Department"
                value={selectedDepartment}
                options={departmentOptions}
                onchange={handleDepartmentChange}>
            </lightning-combobox>

            <lightning-combobox
                label="Employment Type"
                value={selectedType}
                options={typeOptions}
                onchange={handleTypeChange}>
            </lightning-combobox>

            <lightning-input
                type="toggle"
                label="Remote Only"
                checked={remoteOnly}
                onchange={handleRemoteToggle}>
            </lightning-input>
        </div>

        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading jobs..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                <p>Unable to load jobs. Please try again.</p>
            </div>
        </template>

        <!-- Job Cards Grid -->
        <template if:false={isLoading}>
            <template if:true={hasJobs}>
                <div class="jobs-grid">
                    <template for:each={jobs} for:item="job">
                        <div key={job.Id} class="job-card" onclick={handleJobClick} data-id={job.Id}>
                            <div class="job-card-header">
                                <div class="job-title">{job.Name}</div>
                                <div class="job-badges">
                                    <span class="badge badge-dept">{job.Department__c}</span>
                                    <template if:true={job.Remote_Eligible__c}>
                                        <span class="badge badge-remote">🌐 Remote</span>
                                    </template>
                                </div>
                            </div>
                            <div class="job-meta">
                                <span>
                                    <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                                    {job.Location__c}
                                </span>
                                <span>
                                    <lightning-icon icon-name="utility:money" size="x-small"></lightning-icon>
                                    {job.Salary_Range__c}
                                </span>
                                <span>
                                    <lightning-icon icon-name="utility:contract" size="x-small"></lightning-icon>
                                    {job.Employment_Type__c}
                                </span>
                            </div>
                            <div class="job-description">{job.Description__c}</div>
                            <div class="job-footer">
                                <span class="applicant-count">{job.Application_Count__c} applicants</span>
                                <lightning-button
                                    label="View &amp; Apply"
                                    variant="brand"
                                    data-id={job.Id}
                                    onclick={handleViewJob}>
                                </lightning-button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasJobs}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:search" size="large"></lightning-icon>
                    <h3>No jobs found</h3>
                    <p>Try adjusting your filters or search term.</p>
                </div>
            </template>
        </template>

        <!-- Job Detail Modal -->
        <template if:true={showModal}>
            <c-job-detail-card
                job-id={selectedJobId}
                onclose={handleCloseModal}
                onapplied={handleApplicationSubmitted}>
            </c-job-detail-card>
        </template>
    </div>
</template>
