<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
    </template>

    <template if:true={job}>
        <section class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-container" onclick={stopPropagation}>
                <!-- Modal Header -->
                <div class="modal-header">
                    <div class="modal-title-block">
                        <h2 class="modal-job-title">{job.Name}</h2>
                        <div class="modal-badges">
                            <span class="badge badge-dept">{job.Department__c}</span>
                            <span class="badge badge-type">{job.Employment_Type__c}</span>
                            <template if:true={job.Remote_Eligible__c}>
                                <span class="badge badge-remote">🌐 Remote Eligible</span>
                            </template>
                        </div>
                    </div>
                    <button class="close-btn" onclick={handleClose} title="Close">✕</button>
                </div>

                <!-- Job Meta Info -->
                <div class="meta-row">
                    <div class="meta-item">
                        <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                        <span>{job.Location__c}</span>
                    </div>
                    <div class="meta-item">
                        <lightning-icon icon-name="utility:money" size="x-small"></lightning-icon>
                        <span>{job.Salary_Range__c}</span>
                    </div>
                    <div class="meta-item">
                        <lightning-icon icon-name="utility:date_input" size="x-small"></lightning-icon>
                        <span>Deadline: {formattedDeadline}</span>
                    </div>
                    <div class="meta-item">
                        <lightning-icon icon-name="utility:people" size="x-small"></lightning-icon>
                        <span>{job.Application_Count__c} applicants</span>
                    </div>
                </div>

                <!-- Modal Body -->
                <div class="modal-body">
                    <div class="section">
                        <h3>About the Role</h3>
                        <p class="description-text">{job.Description__c}</p>
                    </div>
                    <div class="section">
                        <h3>Requirements</h3>
                        <p class="description-text">{job.Requirements__c}</p>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="modal-footer">
                    <template if:true={alreadyApplied}>
                        <div class="already-applied">
                            <lightning-icon icon-name="utility:check" variant="success" size="small"></lightning-icon>
                            You have already applied for this position.
                        </div>
                    </template>
                    <template if:false={alreadyApplied}>
                        <lightning-button label="Cancel" onclick={handleClose} class="btn-cancel"></lightning-button>
                        <lightning-button
                            label="Apply Now"
                            variant="brand"
                            onclick={handleApplyClick}>
                        </lightning-button>
                    </template>
                </div>

                <!-- Application Form (inline) -->
                <template if:true={showApplicationForm}>
                    <c-application-form
                        job-id={jobId}
                        job-title={job.Name}
                        oncancel={handleFormCancel}
                        onsubmitted={handleFormSubmitted}>
                    </c-application-form>
                </template>
            </div>
        </section>
    </template>
</template>
